<text x="440" y="196" text-anchor="middle" dominant-baseline="central" fill="rgba(255, 255, 255, 0.5)" font-family="'Fira Code', monospace" font-size="11" font-weight="400">Pin 7</text>
<circle cx="440" cy="210" r="5" fill="#00FF41" stroke="rgba(255, 255, 255, 0.15)" stroke-width="0.5"/>
</g>

<!-- ULTRASONIC SENSOR -->
<rect x="440" y="30" width="160" height="70" rx="8" fill="rgb(18, 18, 18)" stroke="#00FF41" stroke-width="1"/>
<text x="520" y="50" text-anchor="middle" dominant-baseline="central" fill="#00FF41" font-family="'Fira Code', monospace" font-size="13" font-weight="600">Ultrasonic sensor</text>
<text x="520" y="68" text-anchor="middle" dominant-baseline="central" fill="rgba(255, 255, 255, 0.4)" font-family="'Fira Code', monospace" font-size="11" font-weight="400">3-pin (VCC, GND, SIG)</text>

<!-- Sensor pin labels -->
<circle cx="480" cy="100" r="4" fill="#E24B4A" stroke-width="0.5" stroke="rgba(255, 255, 255, 0.15)"/>
<text x="480" y="116" text-anchor="middle" fill="rgba(255, 255, 255, 0.5)" font-family="'Fira Code', monospace" font-size="11">VCC</text>
<circle cx="520" cy="100" r="4" fill="#555" stroke-width="0.5" stroke="rgba(255, 255, 255, 0.15)"/>
<text x="520" y="116" text-anchor="middle" fill="rgba(255, 255, 255, 0.5)" font-family="'Fira Code', monospace" font-size="11">GND</text>
